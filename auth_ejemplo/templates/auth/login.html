<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
</head>
<body>
    {% if messages %}
    {% for message in messages %}
    <p style="color: green;">{{message}}</p>
    {% endfor%}
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit">Iniciar sesión</button>
    </form>
</body>
</html>
